version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vortex-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vortex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vortex_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-vortex}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vortex} -d ${POSTGRES_DB:-vortex}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vortex-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: vortex-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vortex-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: vortex-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - vortex-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: vortex-api
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-vortex}:${POSTGRES_PASSWORD:-vortex_secure_pass}@postgres:5432/${POSTGRES_DB:-vortex}?schema=public
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRATION=15m
      - JWT_REFRESH_EXPIRATION=7d
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-32-char-encryption-key-here!!}
      - THROTTLE_TTL=60
      - THROTTLE_LIMIT=100
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - vortex-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: vortex-scraper
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=0
    volumes:
      - scraper_downloads:/home/pwuser/downloads
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - vortex-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    restart: unless-stopped
    # Security hardening - overridden in override file for dev
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
      - /home/pwuser/.cache
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  scraper_downloads:

networks:
  vortex-network:
    driver: bridge